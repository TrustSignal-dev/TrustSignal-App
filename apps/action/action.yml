name: TrustSignal App Runtime Verification
description: Bundled action runtime for the TrustSignal GitHub App repository. The canonical public action lives in TrustSignal/github-actions/trustsignal-verify-artifact.
inputs:
  trustsignal-api-base-url:
    description: Base URL for the TrustSignal verification API.
    required: true
  trustsignal-api-key:
    description: API key used to authenticate to the TrustSignal verification API.
    required: true
outputs:
  receipt_id:
    description: TrustSignal receipt identifier when the verification API returns one.
  verification_status:
    description: Verification lifecycle status returned by the TrustSignal API.
runs:
  using: node20
  main: dist/index.js
