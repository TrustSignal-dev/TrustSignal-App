name: TrustSignal Verification
description: Submit GitHub workflow provenance to the TrustSignal verification API.
inputs:
  trustsignal-api-base-url:
    description: Base URL for the TrustSignal verification API.
    required: true
  trustsignal-api-key:
    description: API key used to authenticate to the TrustSignal verification API.
    required: true
outputs:
  receipt_id:
    description: TrustSignal receipt identifier when the verification API returns one.
  verification_status:
    description: Verification lifecycle status returned by the TrustSignal API.
runs:
  using: node20
  main: dist/index.js
