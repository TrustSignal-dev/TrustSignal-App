name: Action Bundle Check

on:
  pull_request:
    paths:
      - "apps/action/**"
      - "scripts/build.mjs"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "apps/action/**"
      - "scripts/build.mjs"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: bundle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Verify committed action bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild action bundle
        run: npm run build

      - name: Ensure bundle is committed
        run: git diff --exit-code -- apps/action/dist/index.js
